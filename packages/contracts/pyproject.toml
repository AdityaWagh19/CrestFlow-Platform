[project]
name = "crestflow-contracts"
version = "0.1.0"
description = "Algorand smart contracts for CrestFlow (Puya Python)"
requires-python = ">=3.12"

[project.optional-dependencies]
dev = [
  "algorand-python>=2.0.0",
  "algorand-python-testing>=0.4.0",
  "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
